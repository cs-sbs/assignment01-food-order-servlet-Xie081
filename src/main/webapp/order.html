<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>外卖平台 - 首页</title>
</head>
<body>
<h1>欢迎来外卖平台</h1>

<h2>新增订单</h2>
<form action="/order" method="post">
    用户: <input name="customer"><br>
    食物: <input name="food"><br>
    数量: <input name="quantity"><br>
    <input type="submit" value="提交订单">
</form>

<!-- 自动生成的订单超链接会显示在这里 -->
<div id="orderLink"></div>

<script>
    // 页面加载时，读取 URL 中的 orderId 参数
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        if (orderId) {
            // 生成真实的订单详情超链接
            const link = `/order/${orderId}`;
            document.getElementById('orderLink').innerHTML =
                `<a href="${link}">查看订单 ${orderId} 详情</a>`;
        }
    };
</script>
</body>
</html>
